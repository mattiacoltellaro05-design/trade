<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Pro Trader - Dati Reali</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --accent-buy: #00ff88;
            --accent-sell: #ff4444;
            --accent-neutral: #ffaa00;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 10px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 2em; margin-bottom: 10px; background: linear-gradient(45deg, var(--accent-buy), var(--accent-sell)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .main-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
        
        #chart-container { background: #000; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,255,136,0.1); height: 500px; position: relative; }
        #chart { width: 100%; height: 100%; }
        
        .signal-card { 
            padding: 20px; border-radius: 12px; text-align: center; font-size: 1.5em; font-weight: bold; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        .buy { background: linear-gradient(135deg, var(--accent-buy), #00cc66); color: #000; }
        .sell { background: linear-gradient(135deg, var(--accent-sell), #cc3333); color: #fff; }
        .neutral { background: linear-gradient(135deg, var(--accent-neutral), #cc8800); color: #000; }
        .strong { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .metric { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; text-align: center; backdrop-filter: blur(10px); }
        .metric-value { font-size: 1.3em; font-weight: bold; }
        .metric-label { font-size: 0.8em; color: var(--text-secondary); }
        
        .controls { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: rgba(255,255,255,0.1); color: var(--text-primary); }
        button { 
            padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; 
            transition: all 0.3s; margin: 5px; font-size: 1em;
        }
        .btn-primary { background: linear-gradient(45deg, var(--accent-buy), #00cc66); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,136,0.4); }
        .btn-danger { background: var(--accent-sell); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        
        .sidebar { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; height: fit-content; backdrop-filter: blur(10px); }
        .strategy-save { margin-top: 20px; }
        
        .alert { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 8px; color: white; font-weight: bold; transform: translateX(400px); transition: transform 0.3s; z-index: 1000; }
        .alert.show { transform: translateX(0); }
        .alert-success { background: var(--accent-buy); }
        .alert-danger { background: var(--accent-sell); }
        
        #status { text-align: center; padding: 10px; color: var(--text-secondary); font-size: 0.9em; }
        .api-key-input { background: #333 !important; color: #00ff88 !important; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Forex Pro Trader LIVE</h1>
            <p>Analisi tecnica professionale con dati reali Alpha Vantage</p>
        </div>
        
        <div class="main-grid">
            <div>
                <div class="signal-card neutral" id="signal">Inserisci API Key...</div>
                
                <div class="metrics-grid" id="metrics"></div>
                
                <div id="chart-container">
                    <canvas id="chart"></canvas>
                </div>
                
                <div class="controls">
                    <div class="control-group">
                        <label>🔑 Alpha Vantage API Key <span style="color:#ffaa00;">(Gratis su alphavantage.co)</span></label>
                        <input type="text" id="apiKey" class="api-key-input" placeholder="Inserisci la tua API key qui..." value="">
                    </div>
                    <div class="control-group">
                        <label>💱 Simbolo Forex</label>
                        <input type="text" id="symbol" value="EURUSD" placeholder="EURUSD, GBPUSD, USDJPY...">
                    </div>
                    <button class="btn-primary" onclick="updateData()">🔄 Dati Reali LIVE</button>
                    <button class="btn-secondary" onclick="testStrategy()">📊 Backtest</button>
                    <button class="btn-danger" onclick="clearData()">🗑️ Reset</button>
                    <div id="status">1. Vai su alphavantage.co → 2. Ottieni API key gratuita → 3. Inserisci qui → 4. Clicca LIVE</div>
                </div>
            </div>
            
            <div class="sidebar">
                <h3>📈 Indicatori LIVE</h3>
                <div class="metrics-grid" id="indicators">
                    <div class="metric"><div class="metric-value" id="ma-status">-</div><div class="metric-label">Trend MA20</div></div>
                    <div class="metric"><div class="metric-value" id="rsi-status">-</div><div class="metric-label">RSI 14</div></div>
                    <div class="metric"><div class="metric-value" id="macd-status">-</div><div class="metric-label">MACD</div></div>
                    <div class="metric"><div class="metric-value" id="bb-status">-</div><div class="metric-label">Bollinger</div></div>
                    <div class="metric"><div class="metric-value" id="stoch-status">-</div><div class="metric-label">Stochastic</div></div>
                </div>
                <div class="strategy-save">
                    <h4>💾 Salva Setup</h4>
                    <button class="btn-primary" onclick="saveStrategy()">Salva</button>
                    <button class="btn-secondary" onclick="loadStrategy()">Carica</button>
                </div>
            </div>
        </div>
    </div>

    <div id="alert" class="alert"></div>

    <script>
        let prices = [];
        let timestamps = [];
        let indicators = {};
        let audioContext;
        let strategyWins = 0, strategyLosses = 0;
        let lastRealUpdate = 0;
        
        // Inizializza audio
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playAlert(frequency = 800, duration = 200) {
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration / 1000);
            } catch(e) {}
        }
        
        // DATI REALI ALPHA VANTAGE
        async function fetchRealData(symbol = 'EURUSD') {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                showAlert('❌ Inserisci prima la API key!', 'danger');
                return false;
            }
            
            document.getElementById('status').textContent = '📡 Connessione Alpha Vantage...';
            
            try {
                const fromSymbol = symbol.slice(0, 3);
                const toSymbol = symbol.slice(3, 6);
                
                const response = await fetch(
                    `https://www.alphavantage.co/query?function=FX_INTRADAY&from_symbol=${fromSymbol}&to_symbol=${toSymbol}&interval=5min&apikey=${apiKey}&outputsize=compact`
                );
                
                const data = await response.json();
                
                if (data['Error Message']) {
                    throw new Error('API key non valida');
                }
                if (data['Note']) {
                    throw new Error('Limite richieste (attendi 1 min)');
                }
                
                if (!data['Time Series FX (5min)']) {
                    throw new Error('Dati non disponibili per ' + symbol);
                }
                
                const timeSeries = data['Time Series FX (5min)'];
                prices = Object.entries(timeSeries)
                    .slice(0, 100)
                    .map(([time, vals]) => parseFloat(vals['4. close']))
                    .reverse();
                
                timestamps = Object.entries(timeSeries)
                    .slice(0, 100)
                    .map(([time]) => new Date(time).getTime())
                    .reverse();
                
                lastRealUpdate = Date.now();
                document.getElementById('status').textContent = `✅ Dati REALI ${symbol} (${prices.length} candele 5min)`;
                showAlert(`📈 Dati LIVE ${symbol}: ${prices[prices.length-1].toFixed(5)}`);
                return true;
                
            } catch (error) {
                document.getElementById('status').textContent = `❌ ${error.message}`;
                showAlert(error.message, 'danger');
                return false;
            }
        }
        
        // INDICATORI TECNICI (invariati)
        function calculateIndicators() {
            const closes = prices.slice(-100);
            
            indicators.sma20 = [];
            for (let i = 19; i < closes.length; i++) {
                indicators.sma20.push(closes.slice(i-19, i+1).reduce((a,b)=>a+b)/20);
            }
            
            indicators.rsi = calculateRSI(closes, 14);
            const macdLine = calculateMACD(closes, 12, 26);
            indicators.macd = macdLine[macdLine.length - 1];
            indicators.macdSignal = calculateSMA(macdLine.slice(-9), 9)[0];
            
            const sma20 = indicators.sma20[indicators.sma20.length - 1];
            const stdDev = calculateStdDev(closes.slice(-20));
            indicators.bbUpper = sma20 + (stdDev * 2);
            indicators.bbLower = sma20 - (stdDev * 2);
            indicators.bbPosition = (closes[closes.length-1] - indicators.bbLower) / (indicators.bbUpper - indicators.bbLower);
            
            indicators.stoch = calculateStochastic(closes, 14, 3, 3);
        }
        
        function calculateRSI(prices, period) {
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const change = prices[prices.length - i] - prices[prices.length - i - 1];
                if (change > 0) gains += change; else losses -= change;
            }
            const avgGain = gains / period;
            const avgLoss = losses / period;
            const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }
        
        function calculateMACD(prices, fast, slow) {
            const emaFast = calculateEMA(prices, fast);
            const emaSlow = calculateEMA(prices, slow);
            return emaFast.map((f, i) => f - emaSlow[i]);
        }
        
        function calculateEMA(prices, period) {
            const multiplier = 2 / (period + 1);
            const ema = [prices[0]];
            for (let i = 1; i < prices.length; i++) {
                ema.push(prices[i] * multiplier + ema[i-1] * (1 - multiplier));
            }
            return ema;
        }
        
        function calculateSMA(values, period) {
            return [values.slice(-period).reduce((a,b)=>a+b)/period];
        }
        
        function calculateStdDev(values) {
            const mean = values.reduce((a,b)=>a+b)/values.length;
            return Math.sqrt(values.reduce((sq, v) => sq + Math.pow(v-mean, 2), 0) / values.length);
        }
        
        function calculateStochastic(prices, kPeriod, kSmooth, dSmooth) {
            const lowestLow = Math.min(...prices.slice(-kPeriod));
            const highestHigh = Math.max(...prices.slice(-kPeriod));
            const k = ((prices[prices.length-1] - lowestLow) / (highestHigh - lowestLow)) * 100;
            return calculateSMA([k], kSmooth)[0];
        }
        
        // SEGNALE INTELLIGENTE
        function generateSignal() {
            const price = prices[prices.length-1];
            const sma20 = indicators.sma20[indicators.sma20.length-1];
            const rsi = indicators.rsi;
            const macd = indicators.macd;
            const macdSignal = indicators.macdSignal;
            const bbPos = indicators.bbPosition;
            const stoch = indicators.stoch;
            
            let buyScore = 0, sellScore = 0;
            
            if (price > sma20) buyScore += 3; else sellScore += 3;
            if (rsi > 50 && rsi < 70) buyScore += 2;
            if (rsi < 50 && rsi > 30) sellScore += 2;
            if (macd > macdSignal) buyScore += 2.5;
            if (macd < macdSignal) sellScore += 2.5;
            if (bbPos < 0.2) buyScore += 1.5;
            if (bbPos > 0.8) sellScore += 1.5;
            if (stoch < 20) buyScore += 1;
            if (stoch > 80) sellScore += 1;
            
            const totalScore = buyScore - sellScore;
            
            if (totalScore >= 4) return { type: 'BUY', strength: Math.abs(totalScore), score: totalScore };
            if (totalScore <= -4) return { type: 'SELL', strength: Math.abs(totalScore), score: totalScore };
            return { type: 'NEUTRAL', strength: 0, score: totalScore };
        }
        
        // GRAFICO
        function drawChart() {
            const canvas = document.getElementById('chart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = 500;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const data = prices.slice(-50);
            const maxP = Math.max(...data) * 1.02;
            const minP = Math.min(...data) * 0.98;
            const range = maxP - minP;
            
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.beginPath();
            data.forEach((price, i) => {
                const x = (i / (data.length-1)) * (canvas.width - 40) + 20;
                const y = canvas.height - 50 - ((price - minP) / range) * 400;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            if (indicators.sma20?.length > 10) {
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 1;
                ctx.beginPath();
                const smaData = indicators.sma20.slice(-50);
                smaData.forEach((sma, i) => {
                    const x = (i / 49) * (canvas.width - 40) + 20;
                    const y = canvas.height - 50 - ((sma - minP) / range) * 400;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();
            }
        }
        
        function updateUI() {
            const signal = generateSignal();
            const price = prices[prices.length-1];
            
            document.getElementById('signal').textContent = `${signal.type} (${Math.round(signal.score * 10) / 10})`;
            document.getElementById('signal').className = `signal-card ${signal.type.toLowerCase()} ${signal.strength > 6 ? 'strong' : ''}`;
            
            document.getElementById('metrics').innerHTML = `
                <div class="metric"><div class="metric-value">${price.toFixed(5)}</div><div class="metric-label">Prezzo Live</div></div>
                <div class="metric"><div class="metric-value">${indicators.sma20?.[indicators.sma20.length-1]?.toFixed(5) || '-'}</div><div class="metric-label">SMA 20</div></div>
                <div class="metric"><div class="metric-value">${indicators.rsi?.toFixed(1) || '-'}</div><div class="metric-label">RSI</div></div>
                <div class="metric"><div class="metric-value">${(indicators.macd || 0).toFixed(6)}</div><div class="metric-label">MACD</div></div>
                <div class="metric"><div class="metric-value">${(indicators.stoch || 0).toFixed(1)}%</div><div class="metric-label">Stoch</div></div>
                <div class="metric"><div class="metric-value">${((Date.now() - lastRealUpdate)/1000/60).toFixed(0)}min</div><div class="metric-label">Ultimo Update</div></div>
            `;
            
            document.getElementById('ma-status').textContent = prices[prices.length-1] > indicators.sma20?.[indicators.sma20.length-1] ? '🟢' : '🔴';
            document.getElementById('rsi-status').textContent = indicators.rsi > 70 ? '🔴' : indicators.rsi < 30 ? '🟢' : '🟡';
            document.getElementById('macd-status').textContent = indicators.macd > indicators.macdSignal ? '🟢' : '🔴';
            document.getElementById('bb-status').textContent = indicators.bbPosition > 0.8 ? '🔴' : indicators.bbPosition < 0.2 ? '🟢' : '🟡';
            document.getElementById('stoch-status').textContent = indicators.stoch > 80 ? '🔴' : indicators.stoch < 20 ? '🟢' : '🟡';
            
            drawChart();
        }
        
        // FUNZIONI UTILITY
        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
            playAlert(type === 'success' ? 800 : 400);
            setTimeout(() => alert.classList.remove('show'), 5000);
        }
        
        function saveStrategy() {
            const strategy = {
                apiKey: document.getElementById('apiKey').value,
                symbol: document.getElementById('symbol').value,
                lastUpdate: new Date().toISOString()
            };
            localStorage.setItem('forexProReal', JSON.stringify(strategy));
            showAlert('💾 Setup salvato!');
        }
        
        function loadStrategy() {
            const saved = localStorage.getItem('forexProReal');
            if (saved) {
                const strategy = JSON.parse(saved);
                document.getElementById('apiKey').value = strategy.apiKey;
                document.getElementById('symbol').value = strategy.symbol;
                showAlert(`📂 Setup caricato: ${strategy.symbol}`);
            }
        }
        
        function clearData() {
            localStorage.removeItem('forexProReal');
            prices = [];
            strategyWins = 0;
            strategyLosses = 0;
            showAlert('🗑️ Reset completato');
        }
        
        // MAIN UPDATE
        async function updateData() {
            const success = await fetchRealData(document.getElementById('symbol').value.toUpperCase());
            if (success) {
                calculateIndicators();
                updateUI();
                
                const signal = generateSignal();
                if (signal.strength > 6) {
                    showAlert(`🚨 SEGNALE FORTE ${signal.type}! Score: ${signal.score.toFixed(1)}`, signal.type === 'BUY' ? 'success' : 'danger');
                }
            }
        }
        
        // INIT
        initAudio();
        loadStrategy();
        
        // AUTO-UPDATE ogni 2 minuti (limite API)
        setInterval(updateData, 120000);
    </script>
</body>
</html>
